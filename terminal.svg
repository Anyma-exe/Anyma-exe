<svg xmlns="http://www.w3.org/2000/svg" width="700" height="220" viewBox="0 0 700 220">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');

      .bg { fill: #0d1117; }
      .titlebar { fill: #161b22; }
      .border { fill: none; stroke: #30363d; stroke-width: 1; }
      .dot-red { fill: #ff5f57; }
      .dot-yellow { fill: #febc2e; }
      .dot-green { fill: #28c840; }
      .title-text { fill: #8b949e; font-family: 'JetBrains Mono', monospace; font-size: 11px; }

      .prompt { fill: #3fb950; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
      .cmd { fill: #e6edf3; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
      .output { fill: #8b949e; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
      .highlight { fill: #58a6ff; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
      .cursor { fill: #58a6ff; }

      /* Line 1 */
      .line1-prompt { opacity: 0; animation: fadein 0.01s 0.3s forwards; }
      .line1-cmd {
        opacity: 0;
        animation: fadein 0.01s 0.6s forwards;
      }
      .line1-text {
        clip-path: url(#clip1);
      }
      #clip1 rect {
        x: 0; y: 0; width: 0; height: 20;
        animation: typewidth1 0.8s steps(22,end) 0.6s forwards;
      }

      /* Line 2 - output */
      .line2 { opacity: 0; animation: fadein 0.01s 1.6s forwards; }
      .line3 { opacity: 0; animation: fadein 0.01s 1.9s forwards; }

      /* Line 4 */
      .line4-prompt { opacity: 0; animation: fadein 0.01s 2.6s forwards; }
      #clip4 rect {
        x: 0; y: 0; width: 0; height: 20;
        animation: typewidth4 1.0s steps(28,end) 2.6s forwards;
      }
      .line4-cmd { opacity: 0; animation: fadein 0.01s 2.6s forwards; }

      /* Line 5 - output */
      .line5 { opacity: 0; animation: fadein 0.01s 3.8s forwards; }
      .line6 { opacity: 0; animation: fadein 0.01s 4.1s forwards; }

      /* Line 7 */
      .line7-prompt { opacity: 0; animation: fadein 0.01s 4.8s forwards; }
      #clip7 rect {
        x: 0; y: 0; width: 0; height: 20;
        animation: typewidth7 0.6s steps(16,end) 4.8s forwards;
      }
      .line7-cmd { opacity: 0; animation: fadein 0.01s 4.8s forwards; }

      /* Cursor blink */
      .cursor-blink {
        opacity: 0;
        animation: fadein 0.01s 5.6s forwards, blink 1s step-end 5.6s infinite;
      }

      @keyframes fadein { to { opacity: 1; } }
      @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

      @keyframes typewidth1 { to { width: 290px; } }
      @keyframes typewidth4 { to { width: 370px; } }
      @keyframes typewidth7 { to { width: 215px; } }
    </style>

    <clipPath id="clip1">
      <rect x="0" y="0" width="0" height="20">
        <animate attributeName="width" from="0" to="290" dur="0.8s" begin="0.6s" fill="freeze" calcMode="discrete" keyTimes="0;0.045;0.09;0.136;0.181;0.227;0.272;0.318;0.363;0.409;0.454;0.5;0.545;0.59;0.636;0.681;0.727;0.772;0.818;0.863;0.909;0.954;1" keySplines="" values="0;13;26;39;52;65;78;91;104;117;130;143;156;169;182;195;208;221;234;247;260;273;290"/>
      </rect>
    </clipPath>

    <clipPath id="clip4">
      <rect x="0" y="0" width="0" height="20">
        <animate attributeName="width" from="0" to="370" dur="1.0s" begin="2.6s" fill="freeze" calcMode="discrete" keyTimes="0;0.035;0.071;0.107;0.142;0.178;0.214;0.25;0.285;0.321;0.357;0.392;0.428;0.464;0.5;0.535;0.571;0.607;0.642;0.678;0.714;0.75;0.785;0.821;0.857;0.892;0.928;0.964;1" values="0;13;26;39;52;65;78;91;104;117;130;143;156;169;182;195;208;221;234;247;260;273;286;299;312;325;338;351;370"/>
      </rect>
    </clipPath>

    <clipPath id="clip7">
      <rect x="0" y="0" width="0" height="20">
        <animate attributeName="width" from="0" to="215" dur="0.6s" begin="4.8s" fill="freeze" calcMode="discrete" keyTimes="0;0.062;0.125;0.187;0.25;0.312;0.375;0.437;0.5;0.562;0.625;0.687;0.75;0.812;0.875;0.937;1" values="0;13;26;39;52;65;78;91;104;117;130;143;156;169;182;195;215"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="700" height="220" rx="10" class="bg"/>
  <rect width="700" height="220" rx="10" class="border"/>

  <!-- Title bar -->
  <rect width="700" height="36" rx="10" class="titlebar"/>
  <rect y="26" width="700" height="10" class="titlebar"/>
  <rect y="35" width="700" height="1" fill="#30363d"/>

  <!-- Window dots -->
  <circle cx="20" cy="18" r="6" class="dot-red"/>
  <circle cx="40" cy="18" r="6" class="dot-yellow"/>
  <circle cx="60" cy="18" r="6" class="dot-green"/>

  <!-- Title -->
  <text x="350" y="22" text-anchor="middle" class="title-text">anyma@cognitive-lab ~ zsh</text>

  <!-- === LINE 1: python measure.py === -->
  <text x="20" y="72" class="prompt line1-prompt">❯</text>
  <g class="line1-cmd" clip-path="url(#clip1)" transform="translate(36,57)">
    <text x="0" y="15" class="cmd">python run_experiment.py --task fitts</text>
  </g>

  <!-- === LINE 2-3: output === -->
  <text x="20" y="95" class="output line2">  [INFO] Loading paradigm: <tspan class="highlight">Fitts Law v2.1</tspan></text>
  <text x="20" y="113" class="output line3">  [INFO] Trials: 80  ·  Targets: 8  ·  Sampling: 60Hz</text>

  <!-- === LINE 4: analyse === -->
  <text x="20" y="138" class="prompt line4-prompt">❯</text>
  <g class="line4-cmd" clip-path="url(#clip4)" transform="translate(36,123)">
    <text x="0" y="15" class="cmd">python analyse.py --metric MT --model linear</text>
  </g>

  <!-- === LINE 5-6: output === -->
  <text x="20" y="161" class="output line5">  [RESULT] R² = <tspan class="highlight">0.94</tspan>  ·  RMSE = 18.3ms  ·  p &lt; .001</text>
  <text x="20" y="179" class="output line6">  [RESULT] Motor variability → cognitive load proxy  <tspan fill="#3fb950">✓</tspan></text>

  <!-- === LINE 7: git commit === -->
  <text x="20" y="204" class="prompt line7-prompt">❯</text>
  <g class="line7-cmd" clip-path="url(#clip7)" transform="translate(36,189)">
    <text x="0" y="15" class="cmd">git commit -m "add results"</text>
  </g>

  <!-- Cursor -->
  <rect x="254" y="192" width="8" height="14" rx="1" class="cursor cursor-blink"/>
</svg>
